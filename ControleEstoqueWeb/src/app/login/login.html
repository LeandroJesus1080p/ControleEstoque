<div class="min-h-screen bg-slate-50 dark:bg-slate-900 flex items-center justify-center p-4 relative overflow-hidden transition-colors duration-300">
  
  <!-- Background Decorative Shapes -->
  <div class="absolute w-[500px] h-[500px] bg-blue-500/20 dark:bg-blue-600/20 rounded-full blur-[100px] top-[-100px] left-[-100px] mix-blend-multiply dark:mix-blend-lighten pointer-events-none"></div>
  <div class="absolute w-[600px] h-[600px] bg-indigo-500/20 dark:bg-indigo-600/20 rounded-full blur-[100px] bottom-[-150px] right-[-100px] mix-blend-multiply dark:mix-blend-lighten pointer-events-none"></div>

  <!-- Glass Card -->
  <div class="w-full max-w-md bg-white/80 dark:bg-slate-800/80 backdrop-blur-xl border border-white/40 dark:border-slate-700/50 rounded-3xl shadow-2xl overflow-hidden relative z-10 p-8 sm:p-10 transform scale-100 transition-all">
    
    <!-- Logo -->
    <div class="flex flex-col items-center mb-10">
      <div class="w-16 h-16 bg-gradient-to-br from-orange-400 to-red-500 rounded-2xl flex items-center justify-center shadow-lg shadow-orange-500/30 mb-4 transform hover:scale-105 transition-transform duration-300">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="text-white">
          <path d="M12 4L4 8L12 12L20 8L12 4Z" fill="currentColor"/>
          <path d="M4 12L12 16L20 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M4 16L12 20L20 16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <h1 class="text-3xl font-extrabold text-gray-900 dark:text-white tracking-tight">EstoquePro</h1>
      <p class="text-gray-500 dark:text-slate-400 text-sm mt-2 font-medium">Faça login para gerenciar seu estoque.</p>
    </div>

    @if (errorMessage()) {
      <div class="mb-6 p-4 rounded-xl bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-800 flex items-start gap-3">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-red-600 dark:text-red-400 mt-0.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
        </svg>
        <p class="text-sm text-red-800 dark:text-red-300 font-medium">{{ errorMessage() }}</p>
      </div>
    }

    <form class="space-y-6" (ngSubmit)="login()">
      <!-- Email Field -->
      <div class="space-y-2 relative group">
        <label for="email" class="text-sm font-semibold text-gray-700 dark:text-slate-300 ml-1 block">E-mail</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-400 group-focus-within:text-blue-500 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207" />
            </svg>
          </div>
          <input 
            type="email" 
            id="email" 
            [(ngModel)]="email" 
            name="email"
            class="block w-full pl-11 pr-4 py-3.5 bg-gray-50 dark:bg-slate-900/50 border border-gray-200 dark:border-slate-700 rounded-xl text-gray-900 dark:text-white placeholder-gray-400 dark:placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all font-medium" 
            placeholder="seu@email.com"
            required>
        </div>
      </div>

      <!-- Password Field -->
      <div class="space-y-2 relative group">
        <div class="flex items-center justify-between ml-1">
          <label for="password" class="text-sm font-semibold text-gray-700 dark:text-slate-300">Senha</label>
          <a href="#" class="text-sm font-semibold text-blue-600 hover:text-blue-500 dark:text-blue-400 dark:hover:text-blue-300 transition-colors block">Esqueceu a senha?</a>
        </div>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-400 group-focus-within:text-blue-500 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
            </svg>
          </div>
          <input 
            [type]="showPassword() ? 'text' : 'password'" 
            id="password" 
            [(ngModel)]="password" 
            name="password"
            class="block w-full pl-11 pr-12 py-3.5 bg-gray-50 dark:bg-slate-900/50 border border-gray-200 dark:border-slate-700 rounded-xl text-gray-900 dark:text-white placeholder-gray-400 dark:placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all font-medium" 
            placeholder="••••••••"
            required>
            <button 
              type="button" 
              class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-gray-600 dark:hover:text-gray-300"
              (click)="togglePasswordVisibility()">
              @if(showPassword()) {
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" /></svg>
              } @else {
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
              }
            </button>
        </div>
      </div>

      <!-- Submit Button -->
      <button 
        type="submit" 
        [disabled]="isLoading()"
        class="w-full relative py-3.5 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold rounded-xl shadow-lg shadow-blue-500/30 overflow-hidden group transition-all transform active:scale-[0.98] disabled:opacity-70 disabled:cursor-not-allowed">
        @if(isLoading()) {
          <span class="flex items-center justify-center gap-2">
            <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            Entrando...
          </span>
        } @else {
          <span class="relative z-10 flex items-center justify-center gap-2">
            Entrar no Sistema
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" /></svg>
          </span>
        }
      </button>      
    </form>
    
    <div class="mt-8 text-center text-sm">
      <p class="text-gray-500 dark:text-slate-400">
        Não tem uma conta? <a href="#" class="font-semibold text-blue-600 dark:text-blue-400 hover:underline">Entre em contato.</a>
      </p>
    </div>
  </div>
</div>
